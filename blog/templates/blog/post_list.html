<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Blog Posts</title>
</head>
<body>
    <h1>Blog Posts</h1>
    {% if  posts %}
    {% for post in posts %}
    <h2>{{post.title}}</h2>
    <p>{{post.content}}</p>
    <hr>
    {% endfor %}
{% else %}
    <p>No post available</p>
{% endif %}
</body>
</html>
